name: Build tinyplay for Android ARM64

on:
  workflow_dispatch:   # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tinyalsa
        uses: actions/checkout@v4
        with:
          repository: tinyalsa/tinyalsa
          path: tinyalsa

      - name: Set up Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "NDK_HOME=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV
          echo "$(pwd)/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build tinyplay
        working-directory: tinyalsa
        run: |
          export CC=aarch64-linux-android21-clang
          export AR=aarch64-linux-android-ar
          mkdir build && cd build
          cmake -DCMAKE_C_COMPILER=$CC -DCMAKE_AR=$AR -DCMAKE_SYSTEM_NAME=Android ..
          make tinyplay

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinyplay-arm64
          path: tinyalsa/build/tinyplay
