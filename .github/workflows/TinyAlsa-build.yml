name: Build static tinyalsa suite for Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tinyalsa
        uses: actions/checkout@v4
        with:
          repository: tinyalsa/tinyalsa
          path: tinyalsa

      - name: Set up Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "NDK_HOME=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build all tools statically
        working-directory: tinyalsa
        run: |
          mkdir build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-21 \
                -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_C_FLAGS="-static -pthread" \
                -DCMAKE_EXE_LINKER_FLAGS="-static" \
                ..
          make
          echo "=== Build directory contents ==="
          ls -la

      - name: Upload all binaries
        uses: actions/upload-artifact@v4
        with:
          name: tinyalsa-static-arm64
          path: tinyalsa/build/
